<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <!-- PWA / App identity -->
    <meta name="application-name" content="Clarion." />
    <meta name="theme-color" content="#D4784A" />
    <meta name="description" content="News from every angle. See the full picture with left, center, and right coverage side by side." />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Clarion." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Clarion. — Loud & Clear" />
    <meta property="og:description" content="News from every angle. Left, center, and right coverage side by side." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://theclarion.app" />
    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Clarion. — Loud & Clear" />
